<!DOCTYPE html>
<html>

<head>
  <title>Log In</title>
</head>

<body>
  <h2>Log In</h2>

  {% if messages %}
  {% for message in messages %}
  <p>{{ message }}</p>
  {% endfor %}
  {% endif %}

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Log In</button>
  </form>
</body>

</html>
